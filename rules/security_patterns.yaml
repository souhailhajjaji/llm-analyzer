version: "1.0"
category: "security_patterns"
description: "Patterns de sécurité - OWASP Top 10 et autres vulnérabilités"

patterns:
  - id: "SP001"
    name: "Injection SQL"
    description: "Risque d'injection SQL dans les requêtes"
    indicators:
      - "requête sql"
      - "base de données"
      - "select"
      - "insert"
      - "update"
      - "delete"
    severity: "critical"
    recommendation: "Utiliser des requêtes paramétrées ou un ORM"

  - id: "SP002"
    name: "Authentification faible"
    description: "Mécanisme d'authentification insuffisant"
    indicators:
      - "mot de passe"
      - "connexion"
      - "authentification"
      - "login"
      - "identifiant"
    severity: "high"
    recommendation: "Implémenter authentification forte avec MFA possible"

  - id: "SP003"
    name: "Exposition de données sensibles"
    description: "Données sensibles non protégées"
    indicators:
      - "données personnelles"
      - "informations confidentielles"
      - "données privées"
      - "mot de passe"
      - "clé"
    severity: "critical"
    recommendation: "Chiffrer les données sensibles au repos et en transit"

  - id: "SP004"
    name: "Contrôle d'accès manquant"
    description: "Permissions et autorisations non définies"
    indicators:
      - "droit d'accès"
      - "permission"
      - "autorisation"
      - "rôle"
      - "accès"
    severity: "high"
    recommendation: "Implémenter un contrôle d'accès basé sur les rôles (RBAC)"

  - id: "SP005"
    name: "Validation des entrées manquante"
    description: "Aucune validation des données utilisateur"
    indicators:
      - "saisie"
      - "entrée utilisateur"
      - "formulaire"
      - "champ"
    severity: "high"
    recommendation: "Valider et assainir toutes les entrées utilisateur"

  - id: "SP006"
    name: "Configuration de sécurité absente"
    description: "Paramètres de sécurité non documentés"
    indicators:
      - "configuration"
      - "paramètre"
      - "option"
      - "réglage"
    severity: "medium"
    recommendation: "Documenter toutes les configurations de sécurité"

  - id: "SP007"
    name: "Protection CSRF manquante"
    description: "Vulnérabilité aux attaques CSRF"
    indicators:
      - "formulaire"
      - "soumettre"
      - "action"
      - "requête"
    severity: "medium"
    recommendation: "Implémenter des tokens CSRF"

  - id: "SP008"
    name: "Journalisation insuffisante"
    description: "Pas assez de logs pour la sécurité"
    indicators:
      - "log"
      - "journal"
      - "historique"
      - "trace"
    severity: "medium"
    recommendation: "Implémenter une journalisation complète des événements"

  - id: "SP009"
    name: "Utilisation de composants vulnérables"
    description: "Dépendances non sécurisées"
    indicators:
      - "bibliothèque"
      - "package"
      - "dépendance"
      - "librairie"
    severity: "high"
    recommendation: "Maintenir les dépendances à jour et audit de sécurité"

  - id: "SP010"
    name: "Redirection non validée"
    description: "Risque de redirectionsvers des sites malveillants"
    indicators:
      - "redirection"
      - "url"
      - "lien"
      - "navigation"
    severity: "medium"
    recommendation: "Valider et whitelister les URLs de redirection"
